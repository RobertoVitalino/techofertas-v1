name: Sincronizar 20 mais vendidos

on:
  schedule:
    # 13:00 UTC = 09:00 em Mato Grosso do Sul (UTC-4), segunda/quarta/sexta.
    - cron: '0 13 * * 1,3,5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simular sem alterar o catálogo'
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      MERCADO_LIVRE_CLIENT_ID: ${{ secrets.MERCADO_LIVRE_CLIENT_ID }}
      MERCADO_LIVRE_CLIENT_SECRET: ${{ secrets.MERCADO_LIVRE_CLIENT_SECRET }}
      MERCADO_LIVRE_REFRESH_TOKEN: ${{ secrets.MERCADO_LIVRE_REFRESH_TOKEN }}
      MERCADO_LIVRE_MATT_WORD: ${{ secrets.MERCADO_LIVRE_MATT_WORD }}
      MERCADO_LIVRE_MATT_TOOL: ${{ secrets.MERCADO_LIVRE_MATT_TOOL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run bestsellers:sync -- ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') && '--dry-run' || '' }}
